name: Build GEBCO MBTiles

# Triggered by:
#   - The check-gebco-version.yml workflow when a new release is detected
#   - Manual dispatch (for testing or forced rebuilds)
#
# Architecture:
#   1. setup   – validate COG availability
#   2. build   – stream COG, generate hillshade + hypsometric colors, tile to MBTiles
#   3. release – zip output, create GitHub Release, update version state

on:
  workflow_dispatch:
    inputs:
      gebco_year:
        description: 'GEBCO year to build (e.g. 2025)'
        required: true
        default: '2025'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1: Validate inputs
  # ─────────────────────────────────────────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      gebco_year: ${{ steps.validate-cog.outputs.gebco_year }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate COG availability
        id: validate-cog
        run: |
          YEAR="${{ github.event.inputs.gebco_year }}"
          COG_URL="https://s3.us-west-2.amazonaws.com/us-west-2.opendata.source.coop/alexgleith/gebco-${YEAR}/GEBCO_${YEAR}.tif"

          echo "Checking COG: $COG_URL"

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 --retry 3 -r "0-1023" "$COG_URL")

          if [ "$HTTP_CODE" = "206" ] || [ "$HTTP_CODE" = "200" ]; then
            echo "COG available (HTTP $HTTP_CODE)"
            echo "gebco_year=$YEAR" >> "$GITHUB_OUTPUT"
          else
            echo "COG not available (HTTP $HTTP_CODE) for year $YEAR"
            echo "URL: $COG_URL"
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2: Build shaded relief MBTiles (single global pass)
  # ─────────────────────────────────────────────────────────────────────────
  build:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install GDAL
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gdal-bin python3-gdal sqlite3
          echo "GDAL version: $(gdal-config --version)"

      - name: Build global shaded relief
        env:
          OUTDIR: ${{ github.workspace }}/output
          GEBCO_YEAR: ${{ needs.setup.outputs.gebco_year }}
        run: |
          mkdir -p "$OUTDIR"
          chmod +x .github/scripts/build-region.sh

          .github/scripts/build-region.sh \
            "$GEBCO_YEAR" \
            "global" \
            "-180" "-90" "180" "90"

          echo "--- Output files ---"
          ls -lh "$OUTDIR/"

      - name: Prepare release files
        run: |
          YEAR="${{ needs.setup.outputs.gebco_year }}"
          mkdir -p release

          # Rename and zip
          mv output/global_raster.mbtiles "output/gebco-${YEAR}-shaded-relief.mbtiles"
          zip -j "release/gebco-${YEAR}-shaded-relief.zip" "output/gebco-${YEAR}-shaded-relief.mbtiles"
          echo "Zipped: $(du -sh "release/gebco-${YEAR}-shaded-relief.zip")"

          # Generate catalog.json
          REPO="${{ github.repository }}"
          GENERATED=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          jq -n \
            --arg ver "$YEAR" \
            --arg gen "$GENERATED" \
            --arg src "GEBCO ${YEAR} Grid" \
            --arg attr "GEBCO Compilation Group (${YEAR}) GEBCO ${YEAR} Grid (https://www.gebco.net)" \
            --arg url "https://github.com/${REPO}/releases/download/gebco-${YEAR}/gebco-${YEAR}-shaded-relief.zip" \
            '{
              version: $ver,
              generated: $gen,
              source: $src,
              attribution: $attr,
              license: "CC-BY 4.0 (GEBCO data requires attribution)",
              files: [
                {
                  name: ("gebco-" + $ver + "-shaded-relief"),
                  description: "Global shaded relief (bathymetry + topography), z0-z8",
                  format: "raster-mbtiles",
                  bounds: [-180, -90, 180, 90],
                  minzoom: 0,
                  maxzoom: 8,
                  url: $url
                }
              ]
            }' > "release/catalog.json"

          echo "=== Release contents ==="
          ls -lh release/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-files
          path: release/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3: Create GitHub Release and update version state
  # ─────────────────────────────────────────────────────────────────────────
  release:
    needs: [setup, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download release files
        uses: actions/download-artifact@v5
        with:
          name: release-files
          path: release/

      - name: Create GitHub Release
        id: create-release
        uses: actions/github-script@v8
        with:
          script: |
            const year = '${{ needs.setup.outputs.gebco_year }}';
            const tag = `gebco-${year}`;

            // Delete existing release with same tag if present (for rebuilds)
            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tag,
              });
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existing.data.id,
              });
              // Also delete the tag so it can be recreated
              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${tag}`,
                });
              } catch (e) {}
              console.log(`Deleted existing release ${tag}`);
            } catch (e) {
              // No existing release — that's fine
            }

            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `GEBCO ${year} Shaded Relief`,
              body: [
                `## GEBCO ${year} Shaded Relief MBTiles`,
                ``,
                `Global bathymetric and topographic shaded relief tiles derived from the [GEBCO ${year} Grid](https://www.gebco.net/data_and_products/gridded_bathymetry_data/).`,
                ``,
                `| File | Description |`,
                `|------|-------------|`,
                `| \`gebco-${year}-shaded-relief.zip\` | Raster shaded relief (PNG tiles, z0-z8) |`,
                `| \`catalog.json\` | Machine-readable catalog for SignalK charts provider |`,
                ``,
                `### Usage with SignalK`,
                `1. Download and extract the \`.zip\` file`,
                `2. Place the \`.mbtiles\` file in your SignalK charts directory`,
                `3. The chart provider will auto-detect it`,
                ``,
                `### Attribution`,
                `GEBCO Compilation Group (${year}) GEBCO ${year} Grid — [gebco.net](https://www.gebco.net)`,
                ``,
                `> GEBCO's 15 arc-second resolution (~450m cells) is suitable for offshore`,
                `> passage planning but NOT for coastal or harbor navigation.`,
                `> Always use official nautical charts for navigation.`,
              ].join('\n'),
              draft: false,
              prerelease: false,
            });

            console.log(`Created release: ${release.data.html_url}`);
            core.setOutput('release_id', release.data.id);

      - name: Upload files to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          YEAR="${{ needs.setup.outputs.gebco_year }}"
          TAG="gebco-${YEAR}"
          for F in release/*; do
            echo "Uploading $(basename "$F") ($(du -sh "$F" | cut -f1))..."
            gh release upload "$TAG" "$F" --clobber
          done

      - name: Update version state in repository
        run: |
          YEAR="${{ needs.setup.outputs.gebco_year }}"
          TODAY=$(date -u +%Y-%m-%d)
          TAG="gebco-${YEAR}"

          jq -n \
            --argjson year "$YEAR" \
            --arg date "$TODAY" \
            --arg tag "$TAG" \
            '{last_built_year: $year, last_built_date: $date, release_tag: $tag}' \
            > gebco-version.json

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gebco-version.json
          git commit -m "chore: update GEBCO version state to ${YEAR} [skip ci]"
          git push

      - name: Summary
        run: |
          YEAR="${{ needs.setup.outputs.gebco_year }}"
          echo "## GEBCO ${YEAR} Shaded Relief Release Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Release: https://github.com/${{ github.repository }}/releases/tag/gebco-${YEAR}" >> "$GITHUB_STEP_SUMMARY"
